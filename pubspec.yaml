name: CityOne
description: "CityOne - Découvrez les promos autour de vous."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.3.0
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  url_launcher: ^6.2.6
  # State & Storage
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  # Notifications
  flutter_local_notifications: ^17.0.0
  http: ^1.2.0
  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
