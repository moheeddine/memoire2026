name: CityOne
description: "PromoCity - Les meilleures promos près de vous."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  http: ^1.2.0
  google_sign_in: ^6.2.1
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  url_launcher: ^6.2.6
  # State & Storage
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  # Notifications — local + FCM push
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.0.0
  flutter_timezone: ^4.1.0
  timezone: ^0.9.4
  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  share_plus: ^10.0.0
  printing: ^5.13.2
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
